<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form element</title>
</head>
<body>
    <form action="http://localhost:2000" method="post">
        <fieldset>
            <legend>user enquiry</legend>
        <label for="name">name</label>
        <input type="text" id="name" name="name" placeholder="enter your name"><br><br>
        <label for="email">email</label>
        <input type="email" id="email" placeholder="enter your email id"><br><br>
        <label for="pass">password</label>
        <input type="password" id="pass" placeholder="enter your password" /><br><br>
        <label for="age">age</label>
        <input type="number" id="age" placeholder="enter your age">
        <p>select your gender</p>
        <label for="male">male</label>
        <input type="radio" id="male" name="male">
        <label for="female">female</label>
        <input type="radio" id="female" name="male">
          <label for="other">other</label>
        <input type="radio" id="other" name="male"><br><br>

    <label for="file">select your file</label>
    <input type="file" ><br><br>

    <select>
        <!-- <option value="#">select your language</option>
        <option value="html">html</option>
        <option value="css">css</option>
        <option value="js">javascript</option>
        <option value="react">react js</option> -->
        <optgroup label="language">
            <option value="#">select your language</option>
        <option value="html">html</option>
        <option value="css">css</option>
        <option value="js">javascript</option>
        <option value="react">react js</option>
        </optgroup>
        <optgroup label="asia country"> 
            <option value="india">india</option>
            <option value="pak">pakistan</option>
            <option value="nepal">nepal</option>
            <option value="srilanka">sri lanka</option>
        </optgroup>
    </select><br><br>

    <label for="date">date of birth</label>
    <input type="date" ><br><br>
    <label for="mnt">month</label>
    <input type="month"> <br><br>
    <label for="year">year</label>
    <input type="time"><br><br>
    <label for="vol">volume</label>
    <input type="range" name="" id="vol"><br><br>
    
     <input type="search" placeholder="search"><br><br>
     <input type="url"><br><br>
     <input type="color"> <br><br>
     <button type="submit">save</button>
     <button type="reset">reset</button>


        </fieldset>
    </form>
</body>
</html>
